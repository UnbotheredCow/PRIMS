<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Interactive CDN Multicast Optimizer using Prim's Minimum Spanning Tree Algorithm">
  <title>CDN Multicast Optimizer — Prim's Algorithm</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="header">
      <div class="logo">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="url(#grad)" stroke-width="2">
          <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#6366f1"/><stop offset="100%" style="stop-color:#06b6d4"/></linearGradient></defs>
          <circle cx="12" cy="12" r="10"/><path d="M12 2a15 15 0 0 1 4 10 15 15 0 0 1-4 10 15 15 0 0 1-4-10 15 15 0 0 1 4-10z"/><path d="M2 12h20"/>
        </svg>
        <h1>CDN Multicast Optimizer</h1>
      </div>
      <span class="badge">Prim's Algorithm</span>
    </header>

    <!-- Main Layout -->
    <main class="main">
      <!-- Canvas Area -->
      <section class="canvas-section">
        <canvas id="networkCanvas"></canvas>
        <div class="canvas-overlay" id="canvasOverlay">
          <p>Press <strong>Start Simulation</strong> to begin</p>
        </div>
        <!-- Legend -->
        <div class="legend">
          <div class="legend-item"><span class="dot dot-origin"></span>Origin</div>
          <div class="legend-item"><span class="dot dot-fog"></span>Fog Node</div>
          <div class="legend-item"><span class="dot dot-edge"></span>Edge Node</div>
          <div class="legend-item"><span class="line line-mst"></span>MST Edge</div>
          <div class="legend-item"><span class="line line-normal"></span>Network Link</div>
        </div>
      </section>

      <!-- Sidebar -->
      <aside class="sidebar">
        <!-- Controls Card -->
        <div class="card">
          <h2 class="card-title">Controls</h2>
          <div class="controls">
            <button id="btnStart" class="btn btn-primary">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
              Start Simulation
            </button>
            <button id="btnStop" class="btn btn-secondary" disabled>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
              Stop
            </button>
            <button id="btnReset" class="btn btn-ghost">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 4v6h6"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
              Reset Graph
            </button>
          </div>
        </div>

        <!-- Settings Card -->
        <div class="card">
          <h2 class="card-title">Settings</h2>
          <div class="setting">
            <label for="nodeCount">Nodes: <span id="nodeCountVal">45</span></label>
            <input type="range" id="nodeCount" min="20" max="60" value="45">
          </div>
          <div class="setting">
            <label for="animSpeed">Animation Speed: <span id="animSpeedVal">Medium</span></label>
            <input type="range" id="animSpeed" min="1" max="5" value="3">
          </div>
          <div class="setting">
            <label for="latencyInterval">Latency Update (s): <span id="latencyIntervalVal">5</span></label>
            <input type="range" id="latencyInterval" min="3" max="15" value="5">
          </div>
        </div>

        <!-- Stats Card -->
        <div class="card">
          <h2 class="card-title">Statistics</h2>
          <div class="stats">
            <div class="stat">
              <span class="stat-label">Total Nodes</span>
              <span class="stat-value" id="statNodes">—</span>
            </div>
            <div class="stat">
              <span class="stat-label">Total Edges</span>
              <span class="stat-value" id="statEdges">—</span>
            </div>
            <div class="stat">
              <span class="stat-label">MST Cost</span>
              <span class="stat-value" id="statMST">—</span>
            </div>
            <div class="stat">
              <span class="stat-label">MST Edges</span>
              <span class="stat-value" id="statMSTEdges">—</span>
            </div>
            <div class="stat">
              <span class="stat-label">Status</span>
              <span class="stat-value status-idle" id="statStatus">Idle</span>
            </div>
          </div>
        </div>

        <!-- Log Card -->
        <div class="card card-log">
          <h2 class="card-title">Activity Log</h2>
          <div class="log" id="logContainer">
            <p class="log-entry log-info">System initialized. Ready to simulate.</p>
          </div>
        </div>
      </aside>
    </main>
  </div>

  <script src="graph.js"></script>
  <script src="prim.js"></script>
  <script src="renderer.js"></script>
  <script src="app.js"></script>
</body>
</html>
